<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Miss You Dharshika</title>

<style>
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}

.container{
    text-align:center;
    color:white;
}

h1{
    font-size:3rem;
    animation:fadeIn 2s ease-in-out;
}

p{
    font-size:1.3rem;
    margin-top:10px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    background:white;
    color:#ff4b6e;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>I Miss You ❤️</h1>
    <p>Dharshika, every moment without you feels incomplete.</p>
    <button onclick="showMessage()">Click Me</button>
</div>

<script>

function showMessage(){
    alert("I Miss You So Much Dharshika ❤️");
}

function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=Math.random()*20+10+"px";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
